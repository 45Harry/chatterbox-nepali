[project]
name = "chatterbox-nepali"
version = "0.1.7"
description = "Nepali TTS and Voice Conversion by Telvox AI"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = {file = "LICENSE"}
authors = [
    {name = "Telvox AI", email = "hereshem@gmail.com"}
]
dependencies = [
    "numpy>=1.24.0,<2.0.0",
    "librosa>=0.10.0,<0.12.0",
    "soundfile>=0.12.0",
    "s3tokenizer",
    "torch>=2.1.0",
    "torchaudio>=2.1.0",
    "transformers>=4.40.0,<5.0.0",
    "diffusers>=0.27.0,<0.30.0",
    "resemble-perth @ git+https://github.com/resemble-ai/Perth.git@master",
    "conformer>=0.3.2",
    "safetensors>=0.4.0",
    "spacy-pkuseg",
    "pykakasi>=2.2.0",
    "gradio>=4.0.0",
    "pyloudnorm",
    "omegaconf",
    "torchcodec>=0.1.0",
    "tokenizers>=0.15.0",
    "huggingface_hub>=0.23.0",
    "packaging",
    "numba>=0.56.0",
    "scipy>=1.10.0",
]

[project.urls]
Homepage = "https://github.com/45Harry/chatterbox-nepali"
Repository = "https://github.com/45Harry/chatterbox-nepali"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
